<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>三国战棋</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="fonts/xiaozhuan.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/xingkai.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="fonts/fonts.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <section id="home-screen" class="home-screen">
    <div class="home-inner">
      <h1 class="home-title">三国战棋</h1>
      <p class="home-subtitle">三 国 · 策 略 · 对 战</p>
      <div class="home-buttons">
        <button id="btn-local" class="home-btn primary">本机对战</button>
        <button id="btn-ai" class="home-btn">人机对战</button>
      </div>
      <div class="home-foot">
        双人轮流操作棋盘 &nbsp;·&nbsp; 选择武将 · 布阵 · 战斗
      </div>
    </div>
  </section>

  <div id="app" class="hidden">
    <header class="top-bar">
      <div class="top-row">
        <div class="turn" id="turn-info">回合 1 · 红方</div>
        <div class="top-buttons">
          <button id="btn-report" class="act-btn small">战报</button>
          <button id="btn-end" class="act-btn small">结束回合</button>
        </div>
      </div>
    </header>

    <main class="board-wrap">
      <div class="board-scroll">
        <div id="board" class="board"></div>
      </div>
    </main>

    <section id="draft-panel" class="draft-panel">
      <div class="draft-head">
        <span id="draft-status" class="draft-status">选将中</span>
      </div>
      <div id="draft-summary" class="draft-summary"></div>
      <div id="draft-cards" class="draft-cards"></div>
    </section>

    <footer class="bottom-bar">
      <div id="selected-info" class="selected-info">
        <span class="s-name">未选择棋子</span>
        <span class="s-sep">|</span>
        <span class="s-stats"></span>
        <button id="btn-detail" class="act-btn small">详情</button>
      </div>
      <div id="actions" class="actions"></div>
    </footer>

    <section id="banner" class="banner hidden">
      <div class="banner-inner">
        <h2 id="banner-title">胜利</h2>
        <div class="banner-btns">
        <button id="btn-restart" class="act-btn">重新开始</button>
        <button id="btn-home" class="act-btn ghost">返回主页</button>
        </div>
      </div>
    </section>

    <section id="detail-modal" class="detail-modal hidden">
      <div class="detail-modal-inner">
        <div class="detail-modal-head">
          <h3 id="detail-title">武将详情</h3>
          <button id="detail-close" class="act-btn ghost">关闭</button>
        </div>
        <div id="detail-body" class="detail-modal-body"></div>
      </div>
    </section>

    <section id="report-modal" class="report-modal hidden">
      <div class="report-modal-inner">
        <div class="report-modal-head">
          <h3 id="report-title">战报</h3>
          <button id="report-close" class="act-btn ghost">关闭</button>
        </div>
        <div class="report-modal-body">
          <div class="sides">
            <div class="side-card red">
              <div class="side-title">红方</div>
              <ul id="list-red" class="chip-list"></ul>
            </div>
            <div class="side-card blue">
              <div class="side-title">蓝方</div>
              <ul id="list-blue" class="chip-list"></ul>
            </div>
          </div>
          <div id="draft-pool" class="draft-pool-modal"></div>
          <div class="log-block-title">战斗日志</div>
          <div id="log" class="log"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="js/range.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/skills.js"></script>
  <script src="js/generals.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
